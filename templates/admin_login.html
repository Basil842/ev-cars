{% extends 'layout.html' %}

{% block content %}
<div class="auth-container" style="border-color: #f43f5e;">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem; color: #f43f5e;">Admin Portal</h2>
    <form action="{{ url_for('admin_login') }}" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Admin username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Admin password">
        </div>
        <button type="submit" class="btn" style="width: 100%; font-size: 1rem; background: #f43f5e; color: var(--secondary);">Admin
            Login</button>
    </form>
</div>
{% endblock %}
