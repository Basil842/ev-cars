{% extends 'layout.html' %}

{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem; color: var(--primary);">Edit Vehicle Details
    </h2>
    <form action="{{ url_for('edit_car', car_id=car.car_id) }}" method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label>Car Name</label>
                <input type="text" name="name" value="{{ car.name }}" required>
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" name="brand" value="{{ car.brand }}" required>
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" step="0.01" name="price" value="{{ car.price }}" required>
            </div>
            <div class="form-group">
                <label>Range (km)</label>
                <input type="number" name="range_km" value="{{ car.range_km }}" required>
            </div>
            <div class="form-group">
                <label>Battery Capacity (kWh)</label>
                <input type="text" name="battery_capacity" value="{{ car.get('battery_capacity', '') }}" placeholder="e.g. 77.4 kWh">
            </div>
            <div class="form-group">
                <label>Power (bhp)</label>
                <input type="number" name="power_bhp" value="{{ car.get('power_bhp', '') }}" placeholder="e.g. 225">
            </div>
            <div class="form-group">
                <label>DC Fast Charging</label>
                <input type="text" name="charging_dc" value="{{ car.get('charging_dc', '') }}" placeholder="e.g. 45 Min (10-80%)">
            </div>
            <div class="form-group">
                <label>AC Wall Charging</label>
                <input type="text" name="charging_ac" value="{{ car.get('charging_ac', '') }}" placeholder="e.g. 7.5 H (10-100%)">
            </div>
            <div class="form-group">
                <label>Boot Space (Litres)</label>
                <input type="number" name="boot_space" value="{{ car.get('boot_space', '') }}" placeholder="e.g. 490">
            </div>
            <div class="form-group">
                <label>Safety Rating (Stars)</label>
                <input type="number" name="safety_rating" min="1" max="5" value="{{ car.get('safety_rating', '') }}" placeholder="e.g. 5">
            </div>
        </div>
        <div class="form-group">
            <label>Primary Image URL</label>
            <input type="url" name="image_url" value="{{ car.image_url }}">
        </div>
        <div class="form-group">
            <label>Extra Gallery Images (Comma Separated URLs)</label>
            <textarea name="extra_images" placeholder="URL1, URL2, URL3..." style="width: 100%; padding: 0.8rem 1rem; background: #ffffff; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--secondary); min-height: 80px; font-family: inherit;">{{ car.get('extra_images', '') }}</textarea>
        </div>
        <div class="form-group">
            <label>Car Variants (Format: Name | Subtitle | Specs | Price in absolute digits)</label>
            <textarea name="variants_text" placeholder="e.g. Standard Option | (Base Model) | 50 kWh, 400 km | 1500000" style="width: 100%; padding: 0.8rem 1rem; background: #ffffff; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--secondary); min-height: 120px; font-family: inherit; line-height: 1.5;">{{ car.get('variants_text', '') }}</textarea>
            <small style="color: #64748b; font-size: 0.8rem; margin-top: 0.3rem; display: block;">Enter one variant per line. Leave empty to use auto-generated defaults.</small>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description"
                style="width: 100%; padding: 0.8rem 1rem; background: #ffffff; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--secondary); min-height: 100px; font-family: inherit;">{{ car.description }}</textarea>
        </div>

        <div style="margin-bottom: 2rem; border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border);">
            <p style="padding: 0.5rem 1rem; font-size: 0.8rem; color: #64748b; background: rgba(255,255,255,0.05);">
                Current Image Preview:</p>
            <img src="{{ car.image_url }}" alt="Preview" style="width: 100%; height: 150px; object-fit: cover;">
        </div>

        <div style="display: flex; gap: 1rem;">
            <a href="{{ url_for('admin_dashboard') }}" class="btn"
                style="flex: 1; text-align: center; background: rgba(255,255,255,0.1);">Cancel</a>
            <button type="submit" class="btn btn-primary" style="flex: 2;">Update EV Details</button>
        </div>
    </form>
</div>
{% endblock %}
