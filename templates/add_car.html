{% extends 'layout.html' %}

{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem; color: var(--primary);">Add New Electric
        Vehicle</h2>
    <form action="{{ url_for('add_car') }}" method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label>Car Name</label>
                <input type="text" name="name" required placeholder="e.g. Model S">
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" name="brand" required placeholder="e.g. Tesla">
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" step="0.01" name="price" required placeholder="e.g. 79999.99">
            </div>
            <div class="form-group">
                <label>Range (km)</label>
                <input type="number" name="range_km" required placeholder="e.g. 600">
            </div>
            <div class="form-group">
                <label>Battery Capacity (kWh)</label>
                <input type="text" name="battery_capacity" placeholder="e.g. 77.4 kWh">
            </div>
            <div class="form-group">
                <label>Power (bhp)</label>
                <input type="number" name="power_bhp" placeholder="e.g. 225">
            </div>
            <div class="form-group">
                <label>DC Fast Charging</label>
                <input type="text" name="charging_dc" placeholder="e.g. 45 Min (10-80%)">
            </div>
            <div class="form-group">
                <label>AC Wall Charging</label>
                <input type="text" name="charging_ac" placeholder="e.g. 7.5 H (10-100%)">
            </div>
            <div class="form-group">
                <label>Boot Space (Litres)</label>
                <input type="number" name="boot_space" placeholder="e.g. 490">
            </div>
            <div class="form-group">
                <label>Safety Rating (Stars)</label>
                <input type="number" name="safety_rating" min="1" max="5" placeholder="e.g. 5">
            </div>
        </div>
        <div class="form-group">
            <label>Primary Image URL</label>
            <input type="url" name="image_url" placeholder="Paste a high-quality image link">
        </div>
        <div class="form-group">
            <label>Extra Gallery Images (Comma Separated URLs)</label>
            <textarea name="extra_images" placeholder="URL1, URL2, URL3..." style="width: 100%; padding: 0.8rem 1rem; background: #ffffff; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--secondary); min-height: 80px; font-family: inherit;"></textarea>
        </div>
        <div class="form-group">
            <label>Car Variants (Format: Name | Subtitle | Specs | Price in absolute digits)</label>
            <textarea name="variants_text" placeholder="e.g. Standard Option | (Base Model) | 50 kWh, 400 km | 1500000" style="width: 100%; padding: 0.8rem 1rem; background: #ffffff; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--secondary); min-height: 120px; font-family: inherit; line-height: 1.5;"></textarea>
            <small style="color: #64748b; font-size: 0.8rem; margin-top: 0.3rem; display: block;">Enter one variant per line. Leave empty to use auto-generated defaults.</small>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description"
                style="width: 100%; padding: 0.8rem 1rem; background: #ffffff; border: 1px solid var(--glass-border); border-radius: 12px; color: var(--secondary); min-height: 100px; font-family: inherit;"></textarea>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <a href="{{ url_for('admin_dashboard') }}" class="btn"
                style="flex: 1; text-align: center; background: rgba(255,255,255,0.1);">Cancel</a>
            <button type="submit" class="btn btn-primary" style="flex: 2;">Save Car Details</button>
        </div>
    </form>
</div>
{% endblock %}
