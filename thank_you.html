{% extends 'layout.html' %}

{% block content %}
<div class="container flex items-center justify-center min-h-[70vh]">
    <div class="glass-card max-w-lg w-full p-12 text-center fade-in">
        <!-- Success Animation Container -->
        <div class="relative w-48 h-48 mx-auto mb-8">
            <!-- Thank You for Booking GIF (Direct stable link) -->
            <img src="https://i.giphy.com/YrkS92Yw48B5C06M9t.gif" alt="Thank You For Booking"
                class="w-full h-full object-cover rounded-full border-4 border-accent shadow-2xl">

            <!-- Floating Decorative Elements -->
            <div
                class="absolute -top-4 -right-4 w-12 h-12 bg-accent rounded-full animate-bounce delay-100 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </div>

        <h1 class="text-5xl font-black text-white mb-4 tracking-tight">Thank You!</h1>
        <p class="text-xl text-gray-300 mb-8">Your booking for the <span class="text-accent font-bold">{{ car.brand }}
                {{ car.name }}</span> has been confirmed successfully.</p>

        <div class="flex flex-col items-center gap-4">
            <div class="w-16 h-1 border-t-4 border-accent border-dotted animate-pulse"></div>
            <p class="text-sm text-gray-400 uppercase tracking-widest">Generating your invoice...</p>
        </div>

        <div class="mt-12">
            <a href="{{ url_for('invoice', booking_id=booking_id) }}"
                class="text-accent hover:underline flex items-center justify-center gap-2 transition-all group">
                Not redirecting? Click here to view invoice
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>
        </div>
    </div>
</div>

<script>
    // Automatically redirect to the invoice page after 4 seconds
    setTimeout(function () {
        window.location.href = "{{ url_for('invoice', booking_id=booking_id) }}";
    }, 4000);
</script>

<style>
    .animate-float {
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-10px);
        }
    }
</style>
{% endblock %}
