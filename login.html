{% extends 'layout.html' %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">User Login</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1rem;">Sign In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: #64748b;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary);">Register here</a>
    </p>
</div>
{% endblock %}
