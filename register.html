{% extends 'layout.html' %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Create Account</h2>
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Create a password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1rem;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: #64748b;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary);">Login here</a>
    </p>
</div>
{% endblock %}
