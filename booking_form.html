{% extends 'layout.html' %}

{% block content %}
<div class="container section-padding">
    <div class="glass-card max-w-md mx-auto p-8 fade-in">
        <h2 class="text-3xl font-bold text-white mb-6 text-center">Finalize Your Booking</h2>
        <p class="text-gray-300 mb-8 text-center">Please provide your details for the invoice.</p>

        <div class="bg-white/10 p-4 rounded-xl mb-8">
            <h4 class="text-white font-semibold text-center">{{ car.brand }} {{ car.name }}</h4>
            <p class="text-accent text-center">₹{{ "{:,.2f}".format(car.price) }}</p>
        </div>

        <form action="{{ url_for('confirm_booking') }}" method="POST" class="space-y-4">
            <input type="hidden" name="car_id" value="{{ car.car_id }}">

            <div class="form-group">
                <label for="customer_name" class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
                <input type="text" name="customer_name" id="customer_name" value="{{ session['name'] }}" required
                    class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-accent transition-all">
            </div>

            <div class="form-group">
                <label for="customer_email" class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <input type="email" name="customer_email" id="customer_email" required
                    class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-accent transition-all">
            </div>

            <div class="form-group">
                <label for="customer_phone" class="block text-sm font-medium text-gray-300 mb-1">Contact Number</label>
                <input type="text" name="customer_phone" id="customer_phone" required
                    class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-accent transition-all">
            </div>

            <div class="form-group">
                <label for="customer_address" class="block text-sm font-medium text-gray-300 mb-1">Full Address</label>
                <textarea name="customer_address" id="customer_address" rows="3" required
                    class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-accent transition-all"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-full py-3 mt-4 flex justify-center items-center gap-2 group">
                Confirm & Book Car
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}
